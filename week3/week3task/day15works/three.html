<!DOCTYPE html>
<html>
<head>
    <title>FastAPI Broadcast + SSE</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        input, button {
            padding: 8px;
            margin: 5px;
        }

        #chatBox {
            border: 1px solid #ccc;
            height: 250px;
            overflow-y: auto;
            padding: 10px;
        }

        .msg {
            margin: 5px 0;
        }
    </style>
</head>

<body>

<h2>🔥 WebSocket Broadcast Chat</h2>

<input type="text" id="msg" placeholder="Enter message">
<button onclick="sendMsg()">Send</button>

<div id="chatBox"></div>

<hr>

<h2>📡 SSE Counter</h2>
<div id="counter">Loading...</div>

<h2>⏰ Live Clock</h2>
<div id="clock">Loading...</div>

<script>
let ws;

// ---------------- CONNECT WEBSOCKET ----------------
function connectWS() {
    ws = new WebSocket("ws://127.0.0.1:8000/ws");

    ws.onopen = () => {
        addMessage("✅ Connected to server");
    };

    ws.onmessage = (event) => {
        addMessage(event.data);
    };

    ws.onclose = () => {
        addMessage("❌ Disconnected... reconnecting");
        setTimeout(connectWS, 2000);
    };
}

// ---------------- SEND MESSAGE ----------------
function sendMsg() {
    let input = document.getElementById("msg");
    if (input.value.trim() !== "") {
        ws.send(input.value);
        input.value = "";
    }
}

// ---------------- ADD MESSAGE TO CHAT ----------------
function addMessage(msg) {
    let box = document.getElementById("chatBox");
    let div = document.createElement("div");
    div.className = "msg";
    div.innerText = msg;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

// ---------------- SSE COUNTER ----------------
const counter = new EventSource("http://127.0.0.1:8000/events");

counter.onmessage = function(event) {
    document.getElementById("counter").innerText = event.data;
};

// ---------------- SSE CLOCK ----------------
const clock = new EventSource("http://127.0.0.1:8000/clock");

clock.onmessage = function(event) {
    document.getElementById("clock").innerText = event.data;
};

// START WEBSOCKET
connectWS();
</script>

</body>
</html>
