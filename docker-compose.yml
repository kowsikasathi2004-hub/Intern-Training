services:

  backend:
    build:
      context: ./backend

    container_name: backend-container

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app


  frontend:
    build:
      context: ./frontend

    container_name: frontend-container

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules


    depends_on:
      - backend